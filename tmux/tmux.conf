# Prefix configuration
unbind C-b
set-option -g prefix C-f
bind-key a send-prefix

# General behavior
set -g base-index 1
set-option -g renumber-windows on
set -g detach-on-destroy off
set -g mouse off
set -s escape-time 0
set-option -g display-time 4000
set-option -g focus-events on
setw -g mode-keys vi
setw -g aggressive-resize on
set -g main-pane-width 110
set -g history-limit 100000
set -g mouse on

# Terminal & Color Support
set -g default-terminal "tmux-256color"
set-option -g terminal-overrides ',xterm-256color:RGB'
set -ga terminal-features ",*:hyperlinks"

# Undercurl & Underscore Colors
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g set-clipboard on

# Appearance (Catppuccin themed status bar)
set -g status-bg "#a6e3a1"
set -g status-fg black
set -g status-left '#[fg=black,bold]#S '
set -g status-right 'All sessions: #(tmux ls | cut -d: -f1 | tr "\n" " ")'
set -g status-left-length 15
set -g status-right-length 100

set-window-option -g window-status-current-style fg=white,bg=black,bold
set-window-option -g window-style 'bg=#11111b'
set-window-option -g window-active-style 'bg=default'

set -g pane-border-style fg=colour238,bg=default
set -g pane-active-border-style fg="#a6e3a1",bg=default
set -g pane-border-lines double

# Key Bindings
unbind r
bind r source-file ~/.tmux.conf

# Split like Vim
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navigation
bind -n F11 previous-window
bind -n F12 next-window
bind m choose-tree
bind k choose-session

bind-key -n C-S-Left swap-window -d -t -1
bind-key -n C-S-Right swap-window -d -t +1

# Vim Copy Mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -sel clip -i 2>/dev/null || xsel -ib 2>/dev/null"

# Pane Resize
bind < resize-pane -L 10
bind > resize-pane -R 10
bind + resize-pane -D 10
bind - resize-pane -U 10

# Session Management
unbind S
bind S command-prompt 'rename-session %%'
bind N new-session
bind B command-prompt -p "New session name:" "new-session -d -s '%%'; move-window -t '%%:'; switch-client -t '%%'"

# Popups and Custom Scripts integration
bind C-j display-popup -h 20% -w 20% -E "tmux-session-switcher"
bind C-o display-popup -E "tmux-zoxide-window"
bind C-t display-popup -E "tmux-bro"

# File Pickers
bind C-f display-popup -h 60% -w 60% -E "tmux-file-picker"
bind C-r display-popup -h 60% -w 60% -E "tmux-file-picker -d"
bind C-g display-popup -h 60% -w 60% -E "tmux-file-picker -g"
bind C-d display-popup -h 60% -w 60% -E "tmux-file-picker --zoxide --dir-only"
bind C-z display-popup -h 60% -w 60% -E "tmux-file-picker --zoxide"

# Special Tools
bind C-p display-popup -h 70% -w 70% -E "tmux-snaglord"
bind C-s display-popup -h 30 -w 100 -E "workmux dashboard"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-logging'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
